# AIRBDS AI-Readiness Dataset Scoring Metric — question definitions.
#
# For a given metric version the theme and grade of each question are fixed,
# so they are defined here rather than trusted from uploaded assessments.
# One file per version; the filename carries the version (airbds-<version>.yaml).
#
# This is a language-neutral data file: it is the source of truth for the
# question definitions and can be read by any tool, not just the web frontend.

version: "0.3"

questions:
  ACM-1: { theme: Access, grade: Important }
  ACM-2: { theme: Access, grade: Important }
  ACM-3: { theme: Access, grade: Optional }
  ACM-4: { theme: License, grade: Critical }
  ACM-5: { theme: License, grade: Critical }
  ACM-6: { theme: Download, grade: Important }
  ACM-7: { theme: Resource, grade: Optional }
  ACM-8: { theme: Resource, grade: Optional }
  ACM-9: { theme: UID, grade: Critical }
  ACM-10: { theme: Updates, grade: Optional }
  ACM-11: { theme: Bias, grade: Important }
  ACM-12: { theme: Metadata, grade: Critical }
  ACM-13: { theme: Metadata, grade: Critical }
  ACM-14: { theme: Metadata, grade: Optional }
  ACM-15: { theme: Metadata, grade: Optional }
  ACM-16: { theme: Preprocessing, grade: Important }
  ACM-17: { theme: Provenance, grade: Critical }
  ACM-18: { theme: Quality, grade: Important }
  ACM-19: { theme: Quality, grade: Important }
  ACM-20: { theme: Format, grade: Critical }
  ACM-21: { theme: Standards, grade: Important }
  ACM-22: { theme: Format, grade: Optional }
